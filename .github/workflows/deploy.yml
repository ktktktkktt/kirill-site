name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          set -x
          mkdir -p ~/.ssh
          echo "DEPLOY_KEY length: ${#DEPLOY_KEY}"
          echo "$DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key || { echo "ERROR: base64 decode failed"; exit 1; }
          chmod 600 ~/.ssh/deploy_key
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || { echo "ERROR: ssh-keyscan failed for $DEPLOY_HOST"; exit 1; }
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          cd /home/kirill-site
          git pull origin main
          npm install
          npm run build
          pm2 restart site
          EOF
